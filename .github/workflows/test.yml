name: CI/CD

on:
  push:
    branches:
      - main
      - '**'    # all branches
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm install

      # 4️⃣ Run ESLint
      - name: Run ESLint
        run: npm run lint

      # 5️⃣ Run tests
      - name: Run Jest tests
        run: npm run test

      # 6️⃣ Build project
      - name: Build project
        run: npm run build
